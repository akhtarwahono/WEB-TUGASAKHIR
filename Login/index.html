<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Modern - Glassmorphism</title>
    <link rel="stylesheet" href="style.css">
    <!-- Menggunakan ikon dari Font Awesome -->
    <link rel="stylesheet" href="https://cloudflare.com">
</head>
<body>
    <div class="background-animation"></div>
    <div class="login-container">
        <form class="login-form">
            <h2>Silahkan Login</h2>
            <p>Silakan masuk ke akun Anda</p>
            
            <div class="input-group">
                <i class="fas fa-user"></i>
                <input type="text" placeholder="Nama Pengguna" required>
            </div>
            
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" placeholder="Password" required>
            </div>
            
            <div class="options">
                <label><input type="checkbox"> Ingat saya</label>
                <a href="#">Lupa password?</a>
            </div>
            
            <button type="submit" class="login-btn">Masuk</button>
            
            <div class="register-link">
                Belum punya akun? <a href="#">Daftar sekarang</a>
            <div class="kanan"><i class="fab fa-gogle"></i> Google</div>
            </div>
            <button onclick="location.href='../index.html';">Home</button>
            <div id="alertBox" class="alert" style="disply:none;"></div>
        </form>
<script src="js/login.js"></script>   
</body>
</html>
